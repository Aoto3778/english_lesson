<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朗読コーチ — 英語朗読フィードバック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F1E8;
    --surface: #FFFDF8;
    --ink: #2B2620;
    --muted: #7C7365;
    --line: #E4DCCC;
    --accent: #3D5A73;
    --good: #4E7A5A;
    --warn: #A8762F;
    --bad: #A0493E;
    --accent-soft: color-mix(in oklab, var(--accent) 10%, var(--surface));
    --serif-jp: "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--paper); color: var(--ink); font-family: var(--serif-jp); -webkit-font-smoothing: antialiased; }
  .app-root { min-height: 100vh; background: var(--paper); display: flex; flex-direction: column; transition: background 0.3s; }

  /* ---------- ヘッダー ---------- */
  .app-header {
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    padding: 18px 36px; border-bottom: 1px solid var(--line);
    background: color-mix(in oklab, var(--paper) 60%, var(--surface));
  }
  .wordmark { display: flex; flex-direction: column; cursor: pointer; line-height: 1.25; }
  .wordmark-jp { font-size: 21px; font-weight: 700; letter-spacing: 0.12em; }
  .wordmark-en { font-family: var(--sans); font-size: 10px; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; }
  .stepper { display: flex; align-items: center; gap: 10px; font-family: var(--sans); font-size: 13px; }
  .stepper-spacer { flex: 0 1 auto; }
  .step { display: flex; align-items: center; gap: 7px; color: var(--muted); white-space: nowrap; }
  .step[data-state="now"] { color: var(--ink); font-weight: 600; }
  .step[data-state="done"] { color: var(--accent); }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 21px; height: 21px; border-radius: 50%; font-size: 11px;
    border: 1.5px solid currentColor;
  }
  .step[data-state="now"] .step-num { background: var(--accent); border-color: var(--accent); color: var(--surface); }
  .step-line { width: 34px; height: 1px; background: var(--line); }
  .step-line[data-done="1"] { background: var(--accent); }
  .header-nav { display: flex; gap: 8px; }
  .nav-link {
    font-family: var(--serif-jp); font-size: 14px; color: var(--accent);
    background: none; border: none; cursor: pointer; padding: 8px 12px;
    border-radius: 6px; white-space: nowrap;
  }
  .nav-link:hover { background: var(--accent-soft); }
  .nav-link.active { font-weight: 600; }

  /* ---------- レイアウト ---------- */
  .app-main { flex: 1; display: flex; justify-content: center; padding: 40px 36px 80px; }
  .screen { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 22px; }
  .screen-wide { max-width: 980px; }
  .screen-intro { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .screen-title { font-size: 26px; font-weight: 600; letter-spacing: 0.02em; }
  .screen-sub { color: var(--muted); font-size: 14px; margin-top: 8px; line-height: 1.8; }

  /* ---------- カード ---------- */
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 1px 2px rgba(60, 50, 30, 0.04);
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    padding: 18px 24px 0;
  }
  .card-title { font-size: 16px; font-weight: 600; letter-spacing: 0.04em; }
  .card-body { padding: 18px 24px 22px; }
  .card-note { font-family: var(--sans); font-size: 12px; color: var(--muted); }

  /* ---------- ボタン ---------- */
  .btn {
    font-family: var(--serif-jp); font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
    border-radius: 8px; cursor: pointer; padding: 12px 22px; border: 1px solid transparent;
    transition: background 0.15s, opacity 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-sm { font-size: 13px; padding: 8px 14px; font-weight: 500; }
  .btn-primary { background: var(--accent); color: #FFFDF8; }
  .btn-primary:hover:not(:disabled) { background: color-mix(in oklab, var(--accent) 88%, black); }
  .btn-ghost { background: transparent; color: var(--accent); border-color: color-mix(in oklab, var(--accent) 35%, var(--line)); }
  .btn-ghost:hover:not(:disabled) { background: var(--accent-soft); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* ---------- 画面1: 入力 ---------- */
  .passage-input {
    width: 100%; min-height: 300px; resize: vertical; border: none; outline: none;
    background: transparent; padding: 26px 28px;
    font-family: "Source Serif 4", Georgia, serif; font-size: 18px; line-height: 1.9; color: var(--ink);
  }
  .passage-input::placeholder { color: color-mix(in oklab, var(--muted) 60%, transparent); }
  .input-foot {
    display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    padding: 14px 24px; border-top: 1px solid var(--line);
    background: color-mix(in oklab, var(--paper) 40%, var(--surface));
  }
  .input-meta { font-family: var(--sans); font-size: 13px; color: var(--muted); display: flex; gap: 10px; }
  .input-meta strong { color: var(--ink); }
  .dot-sep { opacity: 0.5; }
  .input-actions { display: flex; gap: 10px; align-items: center; }
  .recent-list { list-style: none; display: flex; flex-direction: column; }
  .recent-item {
    display: flex; justify-content: space-between; align-items: center; gap: 18px;
    padding: 12px 4px; border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .recent-item:last-child { border-bottom: none; }
  .recent-item:hover .recent-excerpt { color: var(--accent); }
  .recent-excerpt { font-style: italic; font-family: "Source Serif 4", Georgia, serif; font-size: 15px; }
  .recent-meta { display: flex; align-items: center; gap: 14px; font-family: var(--sans); font-size: 12px; color: var(--muted); white-space: nowrap; }
  .score-chip {
    display: inline-block; min-width: 34px; text-align: center;
    border: 1.5px solid; border-radius: 99px; padding: 2px 8px;
    font-family: var(--sans); font-size: 12px; font-weight: 700;
  }

  /* ---------- 画面2: 朗読 ---------- */
  .rec-intro { align-items: flex-start; }
  .rec-tools { display: flex; gap: 10px; flex-shrink: 0; }
  .reading-pane { padding: 34px 40px; line-height: 2.05; letter-spacing: 0.005em; }
  .read-word { transition: color 0.2s; }
  .rec-dock {
    position: sticky; bottom: 18px; display: flex; align-items: center; gap: 20px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 24px; box-shadow: 0 6px 24px rgba(60, 50, 30, 0.10);
  }
  .rec-btn {
    width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--bad); background: var(--surface); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s;
  }
  .rec-btn:hover { transform: scale(1.05); }
  .rec-btn-dot { width: 26px; height: 26px; border-radius: 50%; background: var(--bad); }
  .rec-btn-square { width: 20px; height: 20px; border-radius: 4px; background: var(--bad); }
  .rec-hint { display: flex; flex-direction: column; gap: 3px; }
  .rec-hint strong { font-size: 16px; }
  .rec-hint span, .rec-hint-sm { font-family: var(--sans); font-size: 12.5px; color: var(--muted); }
  .rec-live { display: flex; align-items: center; gap: 22px; flex: 1; min-width: 0; }
  .rec-time { font-family: var(--sans); font-size: 22px; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 9px; font-weight: 600; }
  .rec-pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--bad); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  .wave { display: flex; align-items: center; gap: 3px; height: 36px; flex: 1; min-width: 80px; }
  .wave-bar {
    width: 3.5px; border-radius: 2px; background: var(--accent); height: 30%;
    transition: height 0.06s linear;
  }
  @media (prefers-reduced-motion: reduce) { .rec-pulse, .spinner { animation: none; } .wave-bar { transition: none; } }
  .analyzing { display: flex; align-items: center; gap: 18px; padding: 6px 2px; }
  .analyzing strong { display: block; font-size: 16px; }
  .analyzing span:last-child { font-family: var(--sans); font-size: 12.5px; color: var(--muted); }
  .spinner {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    border: 3px solid var(--line); border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .rec-error { display: flex; align-items: center; gap: 18px; padding: 4px 2px; flex-wrap: wrap; }
  .rec-error-icon { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: color-mix(in oklab, var(--bad) 14%, var(--surface)); color: var(--bad); font-size: 20px; font-weight: 700; }
  .rec-error-body { flex: 1; min-width: 180px; }
  .rec-error-body strong { display: block; font-size: 15px; color: var(--bad); }
  .rec-error-body span { font-family: var(--sans); font-size: 12.5px; color: var(--muted); line-height: 1.7; }
  .rec-error-actions { display: flex; gap: 10px; }
  .privacy-note {
    font-family: var(--sans); font-size: 12px; color: var(--muted); line-height: 1.75;
    padding: 12px 16px; background: color-mix(in oklab, var(--paper) 50%, var(--surface));
    border: 1px solid var(--line); border-radius: 8px; display: flex; gap: 9px; align-items: flex-start;
  }
  .privacy-note b { color: var(--ink); font-weight: 600; }
  .note-icon { color: var(--accent); flex-shrink: 0; }

  /* ---------- 画面3: 結果 ---------- */
  .results-intro { align-items: flex-start; }
  .results-actions { display: flex; gap: 10px; }
  .saved-note { font-family: var(--sans); font-size: 12px; color: var(--good); margin-left: 14px; white-space: nowrap; }
  .score-grid { display: grid; grid-template-columns: 220px 1fr; gap: 22px; }
  .overall-card .card-body { display: flex; align-items: center; justify-content: center; height: 100%; }
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .ring-label { font-size: 14px; font-weight: 600; letter-spacing: 0.1em; }
  .sbar-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px 28px; }
  .sbar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
  .sbar-label { font-size: 14px; font-weight: 600; }
  .sbar-val { font-family: var(--sans); font-size: 17px; font-weight: 700; }
  .sbar-track { height: 6px; border-radius: 3px; background: var(--line); overflow: hidden; }
  .sbar-fill { height: 100%; border-radius: 3px; }
  .sbar-note { font-family: var(--sans); font-size: 11.5px; color: var(--muted); margin-top: 6px; }

  .anno-grid { display: grid; grid-template-columns: 1fr 280px; gap: 22px; align-items: start; }
  .annotated { line-height: 2.3; padding: 4px 2px; }
  .anno-word { cursor: default; border-radius: 3px; padding: 1px 1px; }
  .anno-word.has-issue { cursor: pointer; }
  .anno-word.has-issue:hover, .anno-word.selected { background: var(--accent-soft); }
  .anno-word.selected { outline: 1.5px solid var(--accent); }
  .pause-mark {
    color: var(--bad); font-weight: 700; cursor: pointer; padding: 0 3px;
    opacity: 0.85; font-family: var(--sans);
  }
  .pause-mark.selected, .pause-mark:hover { background: var(--accent-soft); border-radius: 3px; }
  .pause-mark-inline { color: var(--bad); font-weight: 700; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-family: var(--sans); font-size: 11.5px; color: var(--muted); align-items: center; }
  .legend > span { display: flex; align-items: center; gap: 5px; }
  .lg { width: 16px; height: 0; border-bottom: 2.5px solid; display: inline-block; }
  .lg-pron { border-color: var(--bad); }
  .lg-into { border-color: var(--warn); border-bottom-style: dashed; }
  .lg-stress { border-color: var(--accent); border-bottom-style: dotted; }
  .lg-pause { color: var(--bad); font-weight: 700; font-style: normal; }
  .detail-card { position: sticky; top: 20px; }
  .detail-empty { font-family: var(--sans); font-size: 13px; color: var(--muted); line-height: 1.9; }
  .detail-word { font-family: "Source Serif 4", Georgia, serif; font-size: 26px; font-weight: 600; margin-bottom: 12px; }
  .detail-block { margin-bottom: 14px; }
  .detail-tag {
    display: inline-block; font-family: var(--sans); font-size: 11px; font-weight: 600;
    border: 1px solid; border-radius: 99px; padding: 2px 10px; margin-bottom: 7px;
  }
  .detail-advice { font-size: 13.5px; line-height: 1.9; }
  .detail-listen {
    font-family: var(--serif-jp); font-size: 13px; color: var(--accent); background: none;
    border: none; cursor: pointer; padding: 6px 0; text-decoration: underline; text-underline-offset: 4px;
    white-space: nowrap;
  }
  .pron-banner {
    font-family: var(--sans); font-size: 12.5px; color: var(--warn); line-height: 1.7;
    padding: 10px 14px; background: color-mix(in oklab, var(--warn) 10%, var(--surface));
    border: 1px solid color-mix(in oklab, var(--warn) 30%, var(--line)); border-radius: 8px;
  }

  .pitch-wrap { position: relative; }
  .pitch-svg { width: 100%; height: 170px; display: block; }
  .chart-legend { display: flex; gap: 18px; font-family: var(--sans); font-size: 12px; color: var(--muted); margin-top: 10px; }
  .chart-legend > span { display: flex; align-items: center; gap: 6px; }
  .lg-line { width: 22px; height: 0; display: inline-block; }
  .lg-user { border-bottom: 2.5px solid var(--accent); }
  .lg-model { border-bottom: 2px dashed var(--muted); }

  .pace-list { display: flex; flex-direction: column; gap: 10px; }
  .pace-band-note { font-family: var(--sans); font-size: 11.5px; color: var(--muted); text-align: right; margin-bottom: 2px; }
  .pace-row { display: grid; grid-template-columns: minmax(160px, 0.9fr) 1fr 44px; gap: 14px; align-items: center; }
  .pace-sent { font-family: "Source Serif 4", Georgia, serif; font-size: 13px; font-style: italic; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pace-track { position: relative; height: 10px; border-radius: 5px; background: var(--line); overflow: hidden; }
  .pace-target { position: absolute; left: 61.1%; width: 22.2%; top: 0; bottom: 0; background: color-mix(in oklab, var(--good) 18%, transparent); }
  .pace-fill { position: absolute; left: 0; top: 2px; bottom: 2px; border-radius: 4px; }
  .pace-wpm { font-family: var(--sans); font-size: 13px; font-weight: 700; text-align: right; }

  .coach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
  .coach-h { font-size: 14px; letter-spacing: 0.08em; margin-bottom: 10px; }
  .coach-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .coach-col li { font-size: 13.5px; line-height: 1.85; padding-left: 14px; position: relative; }
  .coach-col li::before { content: "—"; position: absolute; left: 0; color: var(--muted); }

  /* ---------- 画面4: 履歴 ---------- */
  .hist-summary { display: grid; grid-template-columns: repeat(3, minmax(120px, 1fr)) auto; gap: 18px; }
  .hist-stat .card-body { padding: 18px 22px; }
  .stat-num { font-size: 34px; font-weight: 600; line-height: 1.1; }
  .stat-label { font-family: var(--sans); font-size: 12px; color: var(--muted); margin-top: 4px; }
  .hist-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .hist-table th {
    font-family: var(--sans); font-size: 11.5px; font-weight: 600; color: var(--muted);
    text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--line); letter-spacing: 0.06em;
  }
  .hist-table td { padding: 13px 18px; border-bottom: 1px solid var(--line); }
  .hist-table tr:last-child td { border-bottom: none; }
  .hist-table .num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--sans); }
  .hist-date { font-family: var(--sans); color: var(--muted); white-space: nowrap; }
  .hist-excerpt { font-family: "Source Serif 4", Georgia, serif; font-style: italic; }
  .hist-action { text-align: right; }
  .hist-empty { padding: 40px; text-align: center; color: var(--muted); font-family: var(--sans); font-size: 13px; }
  .spark { display: block; }

  /* ---------- 設定 ---------- */
  .settings-grid { display: flex; flex-direction: column; gap: 20px; }
  .set-row { display: flex; flex-direction: column; gap: 8px; }
  .set-label { font-size: 14px; font-weight: 600; }
  .set-swatches { display: flex; gap: 8px; }
  .swatch { width: 34px; height: 34px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; padding: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
  .swatch[data-on="1"] { border-color: var(--ink); }
  .set-seg { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; width: fit-content; }
  .set-seg button { font-family: var(--sans); font-size: 13px; padding: 8px 14px; background: var(--surface); border: none; cursor: pointer; color: var(--muted); }
  .set-seg button[data-on="1"] { background: var(--accent); color: var(--surface); }
  .set-range { width: 240px; max-width: 100%; }
  .set-range-val { font-family: var(--sans); font-size: 13px; color: var(--muted); margin-left: 10px; }

  /* ---------- レスポンシブ (iPad縦・小窓) ---------- */
  @media (max-width: 900px) {
    .app-header { padding: 14px 20px; flex-wrap: wrap; }
    .app-main { padding: 26px 20px 70px; }
    .score-grid, .anno-grid { grid-template-columns: 1fr; }
    .detail-card { position: static; }
    .coach-grid { grid-template-columns: 1fr; }
    .hist-summary { grid-template-columns: 1fr 1fr; }
    .stepper { order: 3; width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- ════════════════════════════════════════════════════════════════════
     解析エンジン(プレーンJS・端末内処理)
     Web Audio API の decode 済み PCM から RMS・無音・ピッチを抽出し、
     SpeechRecognition の認識語と原文を単語アラインメントして採点する。
     ════════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  "use strict";

  var SAMPLE_TEXT = "The North Wind and the Sun were disputing which was the stronger, when a traveler came along wrapped in a warm cloak. They agreed that the one who first succeeded in making the traveler take his cloak off should be considered stronger than the other. Then the North Wind blew as hard as he could, but the more he blew, the more closely did the traveler fold his cloak around him; and at last the North Wind gave up the attempt. Then the Sun shone out warmly, and immediately the traveler took off his cloak. And so the North Wind was obliged to confess that the Sun was the stronger of the two.";

  // 機能語(ストップワード)。これ以外の3文字以上の語を内容語とみなす簡易判定。
  var STOPWORDS = new Set(("a an the and or but nor so yet for of to in on at by from into onto upon with within without about above below over under as is are was were be been being am do does did have has had will would shall should can could may might must not no if then than that this these those it its he she they them his her their our your my me you we i him us".split(/\s+/)));

  var RC_ISSUE_META = {
    pron:   { label: "発音",            color: "var(--bad)",    deco: "underline solid" },
    into:   { label: "イントネーション", color: "var(--warn)",   deco: "underline wavy" },
    stress: { label: "強勢・抑揚",       color: "var(--accent)", deco: "underline dotted" },
    pause:  { label: "間の取り方",       color: "var(--bad)",    deco: "none" }
  };

  var RC_ADVICE = {
    pron: [
      "認識できなかった/置き換わって聞こえた語です。お手本を聞いて口の形を確認しましょう。",
      "語尾の子音が落ちて聞こえます。最後の音まで丁寧に発音しましょう。",
      "母音が曖昧になっています。口を縦にしっかり開けて、明瞭に発音してみましょう。"
    ],
    into: [
      "文末のピッチが平坦です。平叙文の終わりは緩やかに下降させましょう。",
      "ピッチの動きが小さく、単調に聞こえます。意味の山で声を高くしましょう。",
      "疑問文では文末を上げます。文の種類に合わせて抑揚を変えましょう。"
    ],
    stress: [

    var lowN = Math.max(3, Math.floor(sortedRms.length * 0.05));
    var noiseFloor = median(sortedRms.slice(0, lowN));

    var N = rawTokens.length;
    var origNorm = rawTokens.map(norm);
    var origNormFiltered = [], origIndexMap = [];
    for (i = 0; i < origNorm.length; i++) { if (origNorm[i]) { origNormFiltered.push(origNorm[i]); origIndexMap.push(i); } }

    }

    // 文分割

    if (!sentTexts.length) sentTexts = [text.trim()];

    // 文ごとの語インデックス範囲(rawTokens 上で順に割り当て)
    var sentRanges = [], cursor = 0;
    for (var si = 0; si < sentTexts.length; si++) {

    }

    if (scores.pron != null) { num += scores.pron * 1.2; wsum += 1.2; }
    num += scores.into * 1.0; wsum += 1.0;
    num += scores.stress * 1.0; wsum += 1.0;
    num += scores.pause * 1.0; wsum += 1.0;

    var catScores = { "イントネーション": scores.into, "強勢・抑揚": scores.stress, "間の取り方": scores.pause, "速さ・流暢さ": scores.pace };
    if (scores.pron != null) catScores["発音"] = scores.pron;
    var ranked = Object.keys(catScores).map(function (k) { return [k, catScores[k]]; }).sort(function (a, b) { return b[1] - a[1]; });
    var best = ranked[0], worst = ranked[ranked.length - 1];

    var good = [];
    good.push(best[0] + "は安定しています(" + best[1] + "点)。全体として聞き手に伝わる朗読です。");
    good.push((avgWpm >= 110 && avgWpm <= 150) ? ("平均 " + avgWpm + " WPM は朗読として聞き取りやすい速さです。") : "通して最後まで読み切れています。");

    var fix = [];
    if (pronAvailable && counts.pron) fix.push("発音の指摘が " + counts.pron + " 箇所あります。赤い下線の語をお手本と聞き比べてみましょう。");
    if (counts.into) fix.push("文末のイントネーションが " + counts.into + " 箇所で平坦・不自然です。平叙文は下降調を意識しましょう。");
    if (counts.pause) fix.push("意味の区切りでの「間」が " + counts.pause + " 箇所で不足しています。句読点で一拍置きましょう。");
    if (counts.stress) fix.push("強勢が " + counts.stress + " 箇所で弱めです。内容語を強く、機能語を弱く読みましょう。");
    if (unnaturalPauses) fix.push("句の途中で不自然な息継ぎが " + unnaturalPauses + " 箇所ありました。句読点まで一息で読みましょう。");
    if (!fix.length) fix.push("大きな問題はありません。表現の幅を広げる段階です。");

    var next = [];
    next.push(worst[0] + "を重点に、同じ文章をもう一度朗読してみましょう。");
    next.push("「▷ お手本を聞く」で1文ずつ止めながらシャドーイングすると効果的です。");

    return {
      tokens: tokens, counts: counts, scores: scores, overall: overall,
      sentences: sentences, avgWpm: avgWpm, duration: Math.round(duration), totalWords: N,
      pitch: { model: modelCurve, user: userCurve },
      comments: { good: good, fix: fix, next: next },
      pronAvailable: pronAvailable, pronReason: pronReason
    };
  }

  function rcScoreColor(v) {
    if (v == null) return "var(--muted)";
    if (v >= 85) return "var(--good)";
    if (v >= 70) return "var(--accent)";
    if (v >= 55) return "var(--warn)";
    return "var(--bad)";
  }
  function rcFmtTime(sec) { var m = Math.floor(sec / 60), s = sec % 60; return m + ":" + String(s).padStart(2, "0"); }

  Object.assign(window, {
    SAMPLE_TEXT: SAMPLE_TEXT, RC_ISSUE_META: RC_ISSUE_META, RC_ADVICE: RC_ADVICE,
    analyzeReading: analyzeReading, rcScoreColor: rcScoreColor, rcFmtTime: rcFmtTime,
    rcNorm: norm
  });
})();
</script>

<script type="text/babel" data-presets="react">
function Btn({ kind = "default", small, children, ...rest }) {
  return <button className={`btn btn-${kind}${small ? " btn-sm" : ""}`} {...rest}>{children}</button>;
}
function Card({ title, aside, children, className = "", pad = true }) {
  return (
    <section className={`card ${className}`}>
      {(title || aside) && (
        <header className="card-head">
          <h3 className="card-title">{title}</h3>
          {aside && <div className="card-aside">{aside}</div>}
        </header>
      )}
      <div className={pad ? "card-body" : ""}>{children}</div>
    </section>
  );
}
function ScoreRing({ value, size = 132, label }) {
  const r = (size - 14) / 2, c = 2 * Math.PI * r;
  const col = rcScoreColor(value);
  return (
    <div className="ring-wrap" style={{ width: size }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--line)" strokeWidth="9"></circle>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={col} strokeWidth="9"
          strokeLinecap="round" strokeDasharray={`${c * value / 100} ${c}`}
          transform={`rotate(-90 ${size / 2} ${size / 2})`}></circle>
        <text x="50%" y="47%" textAnchor="middle" dominantBaseline="central"
          style={{ font: `600 ${size * 0.27}px 'Noto Serif JP', serif`, fill: "var(--ink)" }}>{value}</text>
        <text x="50%" y="65%" textAnchor="middle"
          style={{ font: `500 ${size * 0.085}px sans-serif`, fill: "var(--muted)", letterSpacing: "0.1em" }}>/ 100</text>
      </svg>
      {label && <div className="ring-label">{label}</div>}
    </div>
  );
}
function ScoreBar({ label, value, note }) {
  const isNull = value == null;
  return (
    <div className="sbar">
      <div className="sbar-top">
        <span className="sbar-label">{label}</span>
        <span className="sbar-val" style={{ color: rcScoreColor(value) }}>{isNull ? "—" : value}</span>
      </div>
      <div className="sbar-track"><div className="sbar-fill" style={{ width: isNull ? "0%" : `${value}%`, background: isNull ? "transparent" : rcScoreColor(value) }}></div></div>
      {note && <div className="sbar-note">{note}</div>}
    </div>
  );
}
function Stepper({ step }) {
  const steps = ["テキスト", "朗読", "フィードバック"];
  return (
    <nav className="stepper" aria-label="進行状況">
      {steps.map((s, i) => (
        <React.Fragment key={s}>
          {i > 0 && <span className="step-line" data-done={i <= step ? "1" : "0"}></span>}
          <span className="step" data-state={i < step ? "done" : i === step ? "now" : "todo"}>
            <span className="step-num">{i + 1}</span>{s}
          </span>
        </React.Fragment>
      ))}
    </nav>
  );
}

function speak(text, rate) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = rate || 0.92;
  const vs = speechSynthesis.getVoices().filter(v => v.lang && v.lang.startsWith("en"));
  if (vs.length) u.voice = vs.find(v => /Google|Samantha|Natural|Daniel/.test(v.name)) || vs[0];
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
  return u;
}

Object.assign(window, { Btn, Card, ScoreRing, ScoreBar, Stepper, speak });
</script>

<!-- ════════════════════════════════════════════════════════════════════
     画面2: 朗読(録音)— 実マイク録音 + Web Audio + 音声認識
     ════════════════════════════════════════════════════════════════════ -->
<script type="text/babel" data-presets="react">
const REC_ERRORS = {
  mic: { title: "マイクを使えませんでした", body: "マイクの許可が必要です。ブラウザのアドレスバーの🎤マークから許可して、もう一度お試しください。" },
  rec: { title: "録音を開始できませんでした", body: "このブラウザは録音(MediaRecorder)に対応していない可能性があります。Chrome / Edge / 新しい Safari でお試しください。" },
  short: { title: "録音が短すぎます", body: "うまく録音できませんでした。マイクに向かって、文章を通して読み上げてください。" },
  silent: { title: "音声が検出されませんでした", body: "声が小さい、またはマイクが入っていない可能性があります。静かな場所で、はっきりと読み上げてください。" },
  decode: { title: "録音の解析に失敗しました", body: "録音データを読み取れませんでした。もう一度録音してください。" }
};
const NUM_BARS = 28;

function RecordScreen({ text, onFinish, onBack, passageSize, enFont }) {
  const [recState, setRecState] = React.useState("idle"); // idle | rec | analyzing | error
  const [elapsed, setElapsed] = React.useState(0);
  const [speaking, setSpeaking] = React.useState(false);
  const [errCode, setErrCode] = React.useState(null);
  const [levels, setLevels] = React.useState(() => Array(NUM_BARS).fill(8));
  const R = React.useRef({}).current;

  React.useEffect(() => () => cleanup(true), []);

  function cleanup(full) {
    clearInterval(R.timer);
    if (R.raf) cancelAnimationFrame(R.raf);
    R.recRunning = false;
    if (R.recog) { try { R.recog.onend = null; R.recog.stop(); } catch (e) {} }
    if (R.stream) { R.stream.getTracks().forEach(t => t.stop()); R.stream = null; }
    if (R.ac && R.ac.state !== "closed") { try { R.ac.close(); } catch (e) {} R.ac = null; }
    if (full && window.speechSynthesis) speechSynthesis.cancel();
  }

  const playModel = () => {
    if (!window.speechSynthesis) return;
    if (speaking) { speechSynthesis.cancel(); setSpeaking(false); return; }
    const u = speak(text, 0.92);
    if (u) { u.onend = () => setSpeaking(false); u.onerror = () => setSpeaking(false); setSpeaking(true); }
  };

  async function startRec() {
    setErrCode(null);
    if (window.speechSynthesis) speechSynthesis.cancel();
    setSpeaking(false);
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
    } catch (e) { setErrCode("mic"); setRecState("error"); return; }
    R.stream = stream;
    R.chunks = [];
    R.recWords = [];
    R.recAvailable = false;

    let mr;
    try { mr = new MediaRecorder(stream); }
    catch (e) { try { mr = new MediaRecorder(stream, { mimeType: "audio/webm" }); } catch (e2) { cleanup(); setErrCode("rec"); setRecState("error"); return; } }
    R.mr = mr;
    mr.ondataavailable = e => { if (e.data && e.data.size) R.chunks.push(e.data); };
    mr.onstop = () => finalize();

    // Web Audio: 入力レベル波形
    const AC = window.AudioContext || window.webkitAudioContext;
    try {
      R.ac = new AC();
      const src = R.ac.createMediaStreamSource(stream);
      const an = R.ac.createAnalyser();
      an.fftSize = 1024;
      src.connect(an);
      R.an = an;
      R.buf = new Uint8Array(an.fftSize);
      R.levelHist = Array(NUM_BARS).fill(8);
    } catch (e) { R.an = null; }

    // SpeechRecognition: 発音アラインメント用(あれば)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      try {
        const r = new SR();
        r.lang = "en-US"; r.continuous = true; r.interimResults = true;
        R.recStart = performance.now();
        r.onresult = ev => {
          for (let i = ev.resultIndex; i < ev.results.length; i++) {
            const res = ev.results[i];
            if (res.isFinal) {
              const conf = res[0].confidence;
              res[0].transcript.trim().split(/\s+/).forEach(wd => {
                const nw = rcNorm(wd);
                if (nw) R.recWords.push({ w: nw, t: (performance.now() - R.recStart) / 1000, conf });
              });
            }
          }
        };
        r.onerror = () => {};
        r.onend = () => { if (R.recRunning) { try { r.start(); } catch (e) {} } };
        R.recRunning = true;
        r.start();
        R.recog = r;
        R.recAvailable = true;
      } catch (e) { R.recAvailable = false; }
    }

    R.startTime = performance.now();
    try { mr.start(); } catch (e) { cleanup(); setErrCode("rec"); setRecState("error"); return; }
    setRecState("rec");
    setElapsed(0);
    R.timer = setInterval(() => setElapsed(e => e + 1), 1000);
    tick();
  }

  function tick() {
    if (!R.an) return;
    R.an.getByteTimeDomainData(R.buf);
    let s = 0;
    for (let i = 0; i < R.buf.length; i++) { const v = (R.buf[i] - 128) / 128; s += v * v; }
    const rms = Math.sqrt(s / R.buf.length);
    const h = Math.max(6, Math.min(100, Math.round(8 + rms * 460)));
    R.levelHist.push(h); R.levelHist.shift();
    setLevels(R.levelHist.slice());
    R.raf = requestAnimationFrame(tick);
  }

  function stopRec() {
    clearInterval(R.timer);
    if (R.raf) cancelAnimationFrame(R.raf);
    R.recRunning = false;
    if (R.recog) { try { R.recog.stop(); } catch (e) {} }
    R.recordedDur = (performance.now() - R.startTime) / 1000;
    if (R.recordedDur < 1.5) { cleanup(); setErrCode("short"); setRecState("error"); return; }
    setRecState("analyzing");
    try { R.mr.stop(); } catch (e) { finalize(); }
  }

  function decodeAudio(ctx, arr) {
    return new Promise((resolve, reject) => {
      const p = ctx.decodeAudioData(arr, resolve, reject);
      if (p && p.then) p.then(resolve, reject);
    });
  }

  async function finalize() {
    if (R.stream) { R.stream.getTracks().forEach(t => t.stop()); R.stream = null; }
    if (R.ac && R.ac.state !== "closed") { try { R.ac.close(); } catch (e) {} R.ac = null; }
    try {
      if (!R.chunks.length) { setErrCode("silent"); setRecState("error"); return; }
      const blob = new Blob(R.chunks, { type: R.chunks[0].type || "audio/webm" });
      const arr = await blob.arrayBuffer();
      const AC = window.AudioContext || window.webkitAudioContext;
      const dctx = new AC();
      const audioBuf = await decodeAudio(dctx, arr.slice(0));
      if (dctx.close) dctx.close();
      const analysis = analyzeReading(audioBuf, R.recWords, text, R.recAvailable, R.recordedDur);
      if (analysis.error) { setErrCode(analysis.error); setRecState("error"); return; }
      onFinish(analysis);
    } catch (e) {
      console.error("analyze failed", e);
      setErrCode("decode"); setRecState("error");
    }
  }

  function retry() { cleanup(); setRecState("idle"); setErrCode(null); setElapsed(0); }

  const words = text.trim().split(/\s+/);

  return (
    <div className="screen">
      <div className="screen-intro rec-intro">
        <div>
          <h2 className="screen-title">通しで朗読しましょう</h2>
          <p className="screen-sub">マイクに向かって、最初から最後まで読み上げてください。読み終えたら停止を押します。</p>
        </div>
        <div className="rec-tools">
          <Btn kind="ghost" small onClick={playModel}>{speaking ? "◼ お手本を停止" : "▷ お手本を聞く"}</Btn>
          <Btn kind="ghost" small onClick={onBack} disabled={recState === "rec" || recState === "analyzing"}>← 文章を直す</Btn>
        </div>
      </div>

      <Card pad={false} className="reading-card">
        <div className="reading-pane" style={{ fontSize: passageSize, fontFamily: enFont }}>
          {words.map((w, i) => <span key={i} className="read-word">{w} </span>)}
        </div>
      </Card>

      <div className="privacy-note">
        <span className="note-icon">🔒</span>
        <span>録音と解析(ピッチ・間・速さ)は<b>すべてこの端末の中だけ</b>で行われ、音声は保存されません。発音判定を行うときのみ、ブラウザ内蔵の音声認識サービスへ音声が送られます(Chrome / Edge)。<b>発音の指摘はあくまで目安</b>で、音素レベルの厳密な評価ではありません。</span>
      </div>

      <div className="rec-dock" data-state={recState}>
        {recState === "idle" && (
          <React.Fragment>
            <button className="rec-btn" onClick={startRec} aria-label="録音開始">
              <span className="rec-btn-dot"></span>
            </button>
            <div className="rec-hint">
              <strong>録音をはじめる</strong>
              <span>静かな場所で、普段より少しゆっくり・大きめの声で</span>
            </div>
          </React.Fragment>
        )}
        {recState === "rec" && (
          <React.Fragment>
            <button className="rec-btn rec-btn-stop" onClick={stopRec} aria-label="録音停止">
              <span className="rec-btn-square"></span>
            </button>
            <div className="rec-live">
              <div className="rec-time"><span className="rec-pulse"></span>{rcFmtTime(elapsed)}</div>
              <div className="wave" aria-hidden="true">
                {levels.map((h, i) => (
                  <span key={i} className="wave-bar" style={{ height: `${h}%` }}></span>
                ))}
              </div>
              <div className="rec-hint-sm">読み終えたら ◼ を押してください</div>
            </div>
          </React.Fragment>
        )}
        {recState === "analyzing" && (
          <div className="analyzing">
            <span className="spinner"></span>
            <div>
              <strong>朗読を解析しています…</strong>
              <span>発音 · イントネーション · 抑揚 · 間の取り方を評価中</span>
            </div>
          </div>
        )}
        {recState === "error" && (
          <div className="rec-error">
            <span className="rec-error-icon">!</span>
            <div className="rec-error-body">
              <strong>{(REC_ERRORS[errCode] || REC_ERRORS.decode).title}</strong>
              <span>{(REC_ERRORS[errCode] || REC_ERRORS.decode).body}</span>
            </div>
            <div className="rec-error-actions">
              <Btn kind="ghost" small onClick={onBack}>← 文章を直す</Btn>
              <Btn kind="primary" small onClick={retry}>もう一度試す</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
Object.assign(window, { RecordScreen });
</script>

<!-- ════════════════════════════════════════════════════════════════════
     画面3: フィードバック結果
     ════════════════════════════════════════════════════════════════════ -->
<script type="text/babel" data-presets="react">
function AnnotatedPassage({ analysis, selected, onSelect, passageSize, enFont }) {
  return (
    <div className="annotated" style={{ fontSize: passageSize * 0.86, fontFamily: enFont }}>
      {analysis.tokens.map(t => (
        <React.Fragment key={t.i}>
          <span
            className={`anno-word${t.issue ? " has-issue" : ""}${selected === t.i ? " selected" : ""}`}
            style={t.issue ? {
              textDecorationLine: "underline",
              textDecorationStyle: RC_ISSUE_META[t.issue].deco.split(" ")[1],
              textDecorationColor: RC_ISSUE_META[t.issue].color,
              textDecorationThickness: "2px",
              textUnderlineOffset: "5px",
            } : null}
            onClick={() => (t.issue || t.pauseMiss) && onSelect(t.i)}
          >{t.w}</span>
          {t.pauseMiss && (
            <span className={`pause-mark${selected === t.i ? " selected" : ""}`} title="間が必要" onClick={() => onSelect(t.i)}>‖</span>
          )}{" "}
        </React.Fragment>
      ))}
    </div>
  );
}

function IssueDetail({ token }) {
  if (!token) return (
    <div className="detail-empty">下線の付いた語、または <span className="pause-mark-inline">‖</span> をクリックすると、個別のアドバイスが表示されます。</div>
  );
  const metas = [];
  if (token.issue) metas.push({ meta: RC_ISSUE_META[token.issue], advice: token.advice });
  if (token.pauseMiss) metas.push({ meta: RC_ISSUE_META.pause, advice: token.pauseAdvice });
  return (
    <div className="detail">
      <div className="detail-word" lang="en">{token.w.replace(/[^A-Za-z']/g, "") || token.w}</div>
      {metas.map((m, i) => (
        <div key={i} className="detail-block">
          <span className="detail-tag" style={{ color: m.meta.color, borderColor: m.meta.color }}>{m.meta.label}</span>
          <p className="detail-advice">{m.advice}</p>
        </div>
      ))}
      <button className="detail-listen" onClick={() => speak(token.w.replace(/[^A-Za-z']/g, ""), 0.8)}>▷ この語のお手本を聞く</button>
    </div>
  );
}

function PitchChart({ pitch }) {
  const W = 760, H = 170, P = 8;
  const toPts = arr => arr.map((v, i) => `${P + i / (arr.length - 1) * (W - 2 * P)},${P + (1 - v) * (H - 2 * P)}`).join(" ");
  return (
    <div className="pitch-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="pitch-svg">
        <line x1={P} y1={H / 2} x2={W - P} y2={H / 2} stroke="var(--line)" strokeDasharray="3 5"></line>
        <polyline points={toPts(pitch.model)} fill="none" stroke="var(--muted)" strokeWidth="1.6" strokeDasharray="6 5" opacity="0.75"></polyline>
        <polyline points={toPts(pitch.user)} fill="none" stroke="var(--accent)" strokeWidth="2.4"></polyline>
      </svg>
      <div className="chart-legend">
        <span><i className="lg-line lg-user"></i> あなた(実測)</span>
        <span><i className="lg-line lg-model"></i> お手本(理想)</span>
      </div>
    </div>
  );
}

function PaceChart({ sentences }) {
  const max = 180;
  return (
    <div className="pace-list">
      <div className="pace-band-note">適正レンジ 110–150 WPM</div>
      {sentences.map((s, i) => {
        const inBand = s.wpm >= 110 && s.wpm <= 150;
        return (
          <div key={i} className="pace-row">
            <span className="pace-sent" title={s.text}>{i + 1}. {s.text.length > 52 ? s.text.slice(0, 52) + "…" : s.text}</span>
            <div className="pace-track">
              <div className="pace-target"></div>
              <div className="pace-fill" style={{ width: `${Math.min(s.wpm / max, 1) * 100}%`, background: inBand ? "var(--good)" : "var(--warn)" }}></div>
            </div>
            <span className="pace-wpm" style={{ color: inBand ? "var(--good)" : "var(--warn)" }}>{s.wpm}</span>
          </div>
        );
      })}
    </div>
  );
}

function ResultsScreen({ analysis, onRetry, onNew, passageSize, enFont }) {
  const [selected, setSelected] = React.useState(null);
  const a = analysis;
  const selToken = selected != null ? a.tokens[selected] : null;
  const catNotes = {
    pron: !a.pronAvailable ? "対応ブラウザでのみ評価" : (a.counts.pron ? `${a.counts.pron}箇所に指摘` : "明瞭です"),
    into: a.counts.into ? "文末の調子に注意" : "自然な抑揚",
    stress: a.counts.stress ? "強弱の差をもう少し" : "リズム良好",
    pause: a.counts.pause ? "区切りで一拍を" : "区切りが明確",
    pace: a.avgWpm >= 110 && a.avgWpm <= 150 ? "聞き取りやすい速さ" : a.avgWpm < 110 ? "やや遅め" : "やや速め",
  };
  return (
    <div className="screen screen-wide">
      <div className="screen-intro results-intro">
        <div>
          <h2 className="screen-title">フィードバック</h2>
          <p className="screen-sub">
            朗読時間 {rcFmtTime(a.duration)} · {a.totalWords} 語 · 平均 {a.avgWpm} WPM
            <span className="saved-note">✓ 履歴に保存しました</span>
          </p>
        </div>
        <div className="results-actions">
          <Btn kind="ghost" small onClick={onNew}>新しい文章</Btn>
          <Btn kind="primary" small onClick={onRetry}>もう一度朗読する ↻</Btn>
        </div>
      </div>

      <div className="score-grid">
        <Card className="overall-card">
          <ScoreRing value={a.overall} label="総合スコア"></ScoreRing>
        </Card>
        <Card className="cats-card" title="項目別評価">
          <div className="sbar-grid">
            <ScoreBar label="発音" value={a.scores.pron} note={catNotes.pron}></ScoreBar>
            <ScoreBar label="イントネーション" value={a.scores.into} note={catNotes.into}></ScoreBar>
            <ScoreBar label="強勢・抑揚" value={a.scores.stress} note={catNotes.stress}></ScoreBar>
            <ScoreBar label="間の取り方" value={a.scores.pause} note={catNotes.pause}></ScoreBar>
            <ScoreBar label="速さ・流暢さ" value={a.scores.pace} note={catNotes.pace}></ScoreBar>
          </div>
        </Card>
      </div>

      {!a.pronAvailable && a.pronReason && (
        <div className="pron-banner">ⓘ {a.pronReason} ピッチ・間・速さ(完全に端末内で処理)で採点しています。</div>
      )}

      <div className="anno-grid">
        <Card title="原文と指摘箇所" aside={
          <div className="legend">
            <span><i className="lg lg-pron"></i>発音</span>
            <span><i className="lg lg-into"></i>イントネーション</span>
            <span><i className="lg lg-stress"></i>強勢・抑揚</span>
            <span><i className="lg-pause">‖</i>間</span>
          </div>
        }>
          <AnnotatedPassage analysis={a} selected={selected} onSelect={i => setSelected(i === selected ? null : i)} passageSize={passageSize} enFont={enFont}></AnnotatedPassage>
        </Card>
        <Card title="アドバイス" className="detail-card">
          <IssueDetail token={selToken}></IssueDetail>
        </Card>
      </div>

      <Card title="イントネーション曲線" aside={<span className="card-note">あなたの実測ピッチ(実線)を、点線のお手本に近づけましょう</span>}>
        <PitchChart pitch={a.pitch}></PitchChart>
      </Card>

      <Card title="文ごとのペース" aside={<span className="card-note">WPM = 1分あたりの語数</span>}>
        <PaceChart sentences={a.sentences}></PaceChart>
      </Card>

      <Card title="コーチからのコメント" className="coach-card">
        <div className="coach-grid">
          <div className="coach-col">
            <h4 className="coach-h" style={{ color: "var(--good)" }}>良かった点</h4>
            <ul>{a.comments.good.map((c, i) => <li key={i}>{c}</li>)}</ul>
          </div>
          <div className="coach-col">
            <h4 className="coach-h" style={{ color: "var(--warn)" }}>改善ポイント</h4>
            <ul>{a.comments.fix.map((c, i) => <li key={i}>{c}</li>)}</ul>
          </div>
          <div className="coach-col">
            <h4 className="coach-h" style={{ color: "var(--accent)" }}>次の練習</h4>
            <ul>{a.comments.next.map((c, i) => <li key={i}>{c}</li>)}</ul>
          </div>
        </div>
      </Card>
    </div>
  );
}
Object.assign(window, { ResultsScreen });
</script>

<!-- ════════════════════════════════════════════════════════════════════
     画面4: 練習履歴
     ════════════════════════════════════════════════════════════════════ -->
<script type="text/babel" data-presets="react">
function Sparkline({ values }) {
  if (values.length < 2) return null;
  const W = 220, H = 56, P = 6;
  const min = Math.min(...values) - 4, max = Math.max(...values) + 4;
  const pts = values.map((v, i) => `${P + i / (values.length - 1) * (W - 2 * P)},${P + (1 - (v - min) / (max - min)) * (H - 2 * P)}`).join(" ");
  return (
    <svg width={W} height={H} className="spark">
      <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2"></polyline>
      {values.map((v, i) => {
        const [x, y] = pts.split(" ")[i].split(",");
        return <circle key={i} cx={x} cy={y} r={i === values.length - 1 ? 3.5 : 2.2} fill={i === values.length - 1 ? "var(--accent)" : "var(--paper)"} stroke="var(--accent)" strokeWidth="1.5"></circle>;
      })}
    </svg>
  );
}

function HistoryScreen({ history, onPractice }) {
  const scores = history.map(h => h.overall).reverse();
  const avg = history.length ? Math.round(history.reduce((a, h) => a + h.overall, 0) / history.length) : 0;
  const best = history.length ? Math.max(...history.map(h => h.overall)) : 0;
  return (
    <div className="screen screen-wide">
      <div className="screen-intro">
        <h2 className="screen-title">練習履歴</h2>
        <p className="screen-sub">スコアの推移と、これまでに練習した文章の記録です。(端末内に最大30件保存)</p>
      </div>

      <div className="hist-summary">
        <Card className="hist-stat"><div className="stat-num">{history.length}</div><div className="stat-label">練習回数</div></Card>
        <Card className="hist-stat"><div className="stat-num">{avg}</div><div className="stat-label">平均スコア</div></Card>
        <Card className="hist-stat"><div className="stat-num">{best}</div><div className="stat-label">ベストスコア</div></Card>
        <Card className="hist-stat hist-trend">
          <div className="stat-label" style={{ marginBottom: 6 }}>直近10回のスコア推移</div>
          <Sparkline values={scores.slice(-10)}></Sparkline>
        </Card>
      </div>

      <Card pad={false}>
        <table className="hist-table">
          <thead>
            <tr><th>日付</th><th>文章</th><th className="num">語数</th><th className="num">WPM</th><th className="num">総合</th><th></th></tr>
          </thead>
          <tbody>
            {history.map((h, i) => (
              <tr key={i}>
                <td className="hist-date">{h.date}</td>
                <td className="hist-excerpt">“{h.excerpt}”</td>
                <td className="num">{h.words}</td>
                <td className="num">{h.wpm}</td>
                <td className="num"><span className="score-chip" style={{ color: rcScoreColor(h.overall), borderColor: rcScoreColor(h.overall) }}>{h.overall}</span></td>
                <td className="hist-action"><Btn kind="ghost" small onClick={() => onPractice(h)}>もう一度練習</Btn></td>
              </tr>
            ))}
          </tbody>
        </table>
        {!history.length && <div className="hist-empty">まだ練習記録がありません。文章を朗読すると、ここに記録されます。</div>}
      </Card>
    </div>
  );
}
Object.assign(window, { HistoryScreen });
</script>

<!-- ════════════════════════════════════════════════════════════════════
     設定 + メインシェル
     ════════════════════════════════════════════════════════════════════ -->
<script type="text/babel" data-presets="react">
const SETTINGS_KEY = "rdcoach_settings_v1";
const HISTORY_KEY = "rdcoach_history_v1";
const DEFAULT_SETTINGS = { accent: "#3D5A73", paper: "#F5F1E8", enFont: "Source Serif 4", passageSize: 22 };
const ACCENTS = ["#3D5A73", "#4A6B57", "#7C4A52", "#5C5470"];
const PAPERS = ["#F5F1E8", "#F7F4F0", "#FAFAF7"];
const EN_FONTS = ["Source Serif 4", "Lora", "Georgia"];

function loadJSON(key, fallback) {
  try { const raw = localStorage.getItem(key); if (raw) return JSON.parse(raw); } catch (e) {}
  return fallback;
}

function SettingsScreen({ settings, setSettings }) {
  const set = (k, v) => setSettings({ ...settings, [k]: v });
  return (
    <div className="screen">
      <div className="screen-intro">
        <h2 className="screen-title">設定</h2>
        <p className="screen-sub">表示の好みを調整します。設定はこの端末に保存されます。</p>
      </div>
      <Card title="表示">
        <div className="settings-grid">
          <div className="set-row">
            <span className="set-label">アクセント色</span>
            <div className="set-swatches">
              {ACCENTS.map(c => <button key={c} className="swatch" data-on={settings.accent === c ? "1" : "0"} style={{ background: c }} onClick={() => set("accent", c)} aria-label={c}></button>)}
            </div>
          </div>
          <div className="set-row">
            <span className="set-label">紙の色</span>
            <div className="set-swatches">
              {PAPERS.map(c => <button key={c} className="swatch" data-on={settings.paper === c ? "1" : "0"} style={{ background: c }} onClick={() => set("paper", c)} aria-label={c}></button>)}
            </div>
          </div>
          <div className="set-row">
            <span className="set-label">英文フォント</span>
            <div className="set-seg">
              {EN_FONTS.map(f => <button key={f} data-on={settings.enFont === f ? "1" : "0"} onClick={() => set("enFont", f)} style={{ fontFamily: `'${f}', Georgia, serif` }}>{f}</button>)}
            </div>
          </div>
          <div className="set-row">
            <span className="set-label">英文サイズ<span className="set-range-val">{settings.passageSize}px</span></span>
            <input className="set-range" type="range" min={18} max={30} value={settings.passageSize} onChange={e => set("passageSize", Number(e.target.value))} />
          </div>
        </div>
      </Card>
      <Card title="このアプリについて">
        <p className="detail-advice" style={{ color: "var(--muted)" }}>
          発音判定は音声認識ベースの<b>近似</b>で、音素レベルの厳密評価ではありません。音声認識は Chrome / Edge かつネット接続時のみ動作します。
          ピッチ・間・速さの評価は<b>完全に端末内</b>で処理され、オフラインでも動作します。録音音声は保存されません(履歴はスコアと文章のみ・最大30件)。
        </p>
      </Card>
    </div>
  );
}

function App() {
  const [settings, setSettingsState] = React.useState(() => Object.assign({}, DEFAULT_SETTINGS, loadJSON(SETTINGS_KEY, {})));
  const [screen, setScreen] = React.useState("input"); // input | record | results | history | settings
  const [text, setText] = React.useState("");
  const [analysis, setAnalysis] = React.useState(null);
  const [history, setHistory] = React.useState(() => loadJSON(HISTORY_KEY, []));

  const setSettings = (s) => { setSettingsState(s); try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {} };
  const saveHistory = (h) => { setHistory(h); try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); } catch (e) {} };

  const finishRecording = (a) => {
    setAnalysis(a);
    const now = new Date();
    const entry = {
      date: `${now.getMonth() + 1}/${now.getDate()}`,
      dateISO: now.toISOString(),
      excerpt: text.trim().split(/\s+/).slice(0, 8).join(" ") + "…",
      text,
      words: a.totalWords, wpm: a.avgWpm, duration: a.duration,
      overall: a.overall, scores: a.scores,
      issues: a.tokens.filter(t => t.issue).map(t => ({ wordIndex: t.i, type: t.issue })),
    };
    saveHistory([entry, ...history].slice(0, 30));
    setScreen("results");
  };

  const enFont = `'${settings.enFont}', Georgia, serif`;
  const step = screen === "input" ? 0 : screen === "record" ? 1 : screen === "results" ? 2 : -1;

  return (
    <div className="app-root" style={{ "--accent": settings.accent, "--paper": settings.paper }}>
      <header className="app-header">
        <div className="wordmark" onClick={() => setScreen("input")} role="button">
          <span className="wordmark-jp">朗読コーチ</span>
          <span className="wordmark-en">Oral Reading Coach</span>
        </div>
        {step >= 0 ? <Stepper step={step}></Stepper> : <div className="stepper-spacer"></div>}
        <nav className="header-nav">
          <button className={`nav-link${screen === "history" ? " active" : ""}`} onClick={() => setScreen(screen === "history" ? "input" : "history")}>
            {screen === "history" ? "← 練習にもどる" : "練習履歴"}
          </button>
          <button className={`nav-link${screen === "settings" ? " active" : ""}`} onClick={() => setScreen(screen === "settings" ? "input" : "settings")}>
            {screen === "settings" ? "← もどる" : "設定"}
          </button>
        </nav>
      </header>

      <main className="app-main">
        {screen === "input" && (
          <InputScreen text={text} setText={setText} history={history} onStart={() => setScreen("record")}></InputScreen>
        )}
        {screen === "record" && (
          <RecordScreen text={text} passageSize={settings.passageSize} enFont={enFont}
            onFinish={finishRecording} onBack={() => setScreen("input")}></RecordScreen>
        )}
        {screen === "results" && analysis && (
          <ResultsScreen analysis={analysis} passageSize={settings.passageSize} enFont={enFont}
            onRetry={() => setScreen("record")}
            onNew={() => { setText(""); setScreen("input"); }}></ResultsScreen>
        )}
        {screen === "history" && (
          <HistoryScreen history={history} onPractice={(h) => { setText(h.text || ""); setScreen(h.text ? "record" : "input"); }}></HistoryScreen>
        )}
        {screen === "settings" && (
          <SettingsScreen settings={settings} setSettings={setSettings}></SettingsScreen>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App></App>);
</script>

</body>
</html>
